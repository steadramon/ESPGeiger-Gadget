name: Build

on:
  push:
    paths-ignore:
      - 'README.md'
      - 'docs/**'
      - 'CLAUDE.md'
  pull_request:
    paths-ignore:
      - 'README.md'
      - 'docs/**'
      - 'CLAUDE.md'
  workflow_dispatch:
    inputs:
      ref:
        description: 'Git ref (branch/tag/SHA) to build. Leave blank for current.'
        required: false
        default: ''

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        environments:
          - "cyd"
          - "cyd_debug"
          - "cyd_ili9341"
    runs-on: ubuntu-24.04
    name: Build with PlatformIO
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ inputs.ref }}
          fetch-depth: 0   # scripts/git_rev.py needs tag history
          submodules: recursive
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install platformio
        run: |
          python -m pip install --upgrade pip
          pip install 'platformio==6.1.9'
      - name: Run PlatformIO
        run: |
          platformio pkg install -e ${{ matrix.environments }}
          # tool-esptoolpy 2.x ships esptool.py without +x, which elf2image execs directly
          find ~/.platformio/packages -name 'esptool.py' -exec chmod +x {} +
          platformio run -e ${{ matrix.environments }}
      - name: Upload Assets
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.environments }}
          path: |
            .pio/build/*/firmware.bin
            .pio/build/*/firmware.elf
          retention-days: 7
