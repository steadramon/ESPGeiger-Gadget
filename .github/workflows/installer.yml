name: Web Installer

# Publishes a release's web installer bundle (espgadget-webinstaller-<tag>.zip,
# built by release.yml) to GitHub Pages. Run by hand once happy with a release;
# blank tag uses the latest.
on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to publish (blank = latest)"
        required: false
        default: ""

concurrency:
  group: web-installer
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - name: Download web installer bundle
        uses: robinraju/release-downloader@v1.10
        with:
          repository: ${{ github.repository }}
          latest: ${{ github.event.inputs.tag == '' }}
          tag: ${{ github.event.inputs.tag }}
          fileName: "espgadget-webinstaller-*.zip"
          out-file-path: "dl"

      - name: Unpack bundle
        run: |
          mkdir site
          unzip -o dl/espgadget-webinstaller-*.zip -d site

      - name: Publish to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./site
          publish_branch: gh-pages
          # Orphan commit per publish keeps firmware binaries out of branch history
          force_orphan: true
