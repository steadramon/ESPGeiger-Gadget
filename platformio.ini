; ESPGeiger Gadget - single hardware family: Sunton ESP32-2432S028R
; (classic 2.8" 240x320 CYD). Display+touch driven by LovyanGFX.
;
; Two revisions ship with different panel controllers; same pin map.
;   * Rv3       -> ST7789       (env `cyd`, the default)
;   * R / Rv2   -> ILI9341      (env `cyd_ili9341`)
; MISO from the panel isn't reliably wired on this board, so runtime
; auto-detection isn't viable - flash whichever firmware matches your
; board. If the screen looks wrong after `cyd`, try `cyd_ili9341`.

[platformio]
default_envs = cyd

[env]
platform = espressif32@6.7.0
framework = arduino
board = esp32dev
monitor_speed = 115200
extra_scripts = pre:scripts/gzip_assets.py
; min_spiffs gives two 1.9 MB OTA app slots + a 128 KB SPIFFS scratch
; partition. Dual slots are required for over-the-air updates - bad uploads
; revert to the previous slot on next boot via esp_ota's rollback marker.
; The migration from the old huge_app layout is a one-time wire-flash.
board_build.partitions = min_spiffs.csv
build_flags =
  '-DLV_CONF_PATH="${platformio.include_dir}/lv_conf.h"'
  -DARDUINO_USB_CDC_ON_BOOT=0
  !python scripts/git_rev.py
lib_deps =
  lvgl/lvgl@^9.2.2
  lovyan03/LovyanGFX@^1.2.0

; -----------------------------------------------------------------------------
; ST7789 panel (Sunton Rv3) - default
; -----------------------------------------------------------------------------
[env:cyd]
build_flags =
  ${env.build_flags}
  -DPANEL_ST7789

[env:cyd_debug]
extends = env:cyd
build_flags =
  ${env:cyd.build_flags}
  -DCORE_DEBUG_LEVEL=4
  -DDEBUG_GADGET=1

; -----------------------------------------------------------------------------
; ILI9341 panel (Sunton R / Rv2)
; -----------------------------------------------------------------------------
[env:cyd_ili9341]

[env:cyd_ili9341_debug]
extends = env:cyd_ili9341
build_flags =
  ${env.build_flags}
  -DCORE_DEBUG_LEVEL=4
  -DDEBUG_GADGET=1
